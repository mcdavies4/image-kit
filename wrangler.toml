name = "rightimagekit-ai"
main = "worker.js"
compatibility_date = "2024-11-01"

# Secret is NOT stored here. Set it once with:
#   wrangler secret put ANTHROPIC_API_KEY
#
# Then deploy:
#   wrangler deploy
#
# Your Worker URL will look like:
#   https://rightimagekit-ai.<your-subdomain>.workers.dev
# Put that URL into WORKER_URL inside index.html.
